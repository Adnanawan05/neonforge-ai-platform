services:
  api:
    build:
      context: ./apps/api
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - DATABASE_URL=sqlite:///./data/neonforge.db
      - UPLOAD_DIR=./data/uploads
      - ARTIFACT_DIR=./data/artifacts
    volumes:
      - ./apps/api/data:/app/data
    ports:
      - "8000:8000"
  web:
    build:
      context: ./apps/web
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
